name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: confluence-backup-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: confluence-backup-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: confluence-backup-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build \
            -mod=vendor \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ${{ matrix.artifact }} \
            ./cmd/backup/

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30
